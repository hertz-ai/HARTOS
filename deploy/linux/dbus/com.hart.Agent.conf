<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- HART OS Agent D-Bus service configuration -->

  <policy user="hart">
    <allow own="com.hart.Agent"/>
    <allow send_destination="com.hart.Agent"/>
    <allow send_interface="com.hart.Agent"/>
  </policy>

  <policy context="default">
    <allow send_destination="com.hart.Agent"/>
    <allow receive_sender="com.hart.Agent"/>
  </policy>
</busconfig>
