# HART OS SSH brute-force protection
# Install: cp to /etc/fail2ban/jail.d/hart-sshd.conf
[sshd]
enabled = true
port = ssh
filter = sshd
logpath = /var/log/auth.log
maxretry = 5
bantime = 3600
findtime = 600
backend = systemd

[hart-api]
enabled = true
port = 6777
filter = hart-api
logpath = /var/log/hart/backend.log
maxretry = 20
bantime = 600
findtime = 60
