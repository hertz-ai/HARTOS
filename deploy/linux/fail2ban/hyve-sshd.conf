# HyveOS SSH brute-force protection
# Install: cp to /etc/fail2ban/jail.d/hyve-sshd.conf
[sshd]
enabled = true
port = ssh
filter = sshd
logpath = /var/log/auth.log
maxretry = 5
bantime = 3600
findtime = 600
backend = systemd

[hyve-api]
enabled = true
port = 6777
filter = hyve-api
logpath = /var/log/hyve/backend.log
maxretry = 20
bantime = 600
findtime = 60
