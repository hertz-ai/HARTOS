# HyveOS Edge Variant Configuration
# Minimal footprint, observer-tier only
# Target: IoT devices, embedded systems, Raspberry Pi Zero, edge nodes

[variant]
name = edge
description = HyveOS Edge — Minimal observer node for constrained devices
base = ubuntu-server-22.04

[packages]
# Minimal core only
include = python3.10 python3.10-venv python3-pip curl

# Strip unnecessary packages
exclude = man-db manpages snapd cloud-init landscape-common
exclude = plymouth* vim-* nano*

[services]
# Only backend + discovery (observer mode)
hyve-backend = enabled
hyve-discovery = enabled
hyve-agent-daemon = disabled
hyve-vision = disabled
hyve-llm = disabled

[resources]
# Designed for <2GB RAM
min_ram_gb = 1
min_disk_gb = 4
max_cpu_percent = 50

# Reduced thread counts
backend_threads = 8
gossip_interval = 300

[network]
backend_port = 6777
discovery_port = 6780
