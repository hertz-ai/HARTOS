# HyveOS Server Variant Configuration
# Headless, all services, no GUI
# Target: servers, cloud VMs, Raspberry Pi

[variant]
name = server
description = HyveOS Server — Full headless node with all services
base = ubuntu-server-22.04

[packages]
# Core (always included)
include = python3.10 python3.10-venv python3-pip ufw git curl rsync xxd htop

# Monitoring
include = nvtop iotop sysstat

# No GUI packages
exclude = gdm3 gnome-* xorg* wayland*

[services]
# All services enabled
hyve-backend = enabled
hyve-discovery = enabled
hyve-agent-daemon = enabled
hyve-vision = enabled-if-model
hyve-llm = enabled-if-model

[resources]
# No artificial limits — use all available
min_ram_gb = 4
min_disk_gb = 10
max_cpu_percent = 100

[network]
# All ports open
backend_port = 6777
discovery_port = 6780
vision_port = 9891
llm_port = 8080
