# HyveOS Desktop Variant Configuration
# GNOME minimal + D-Bus + system tray + browser dashboard
# Target: workstations, developer machines

[variant]
name = desktop
description = HyveOS Desktop — Node with GUI dashboard and system tray
base = ubuntu-desktop-minimal-22.04

[packages]
# Core
include = python3.10 python3.10-venv python3-pip ufw git curl rsync xxd htop

# Desktop integration
include = python3-dbus python3-gi policykit-1 gnome-shell-extensions
include = python3-pystray python3-pil

# Browser for dashboard
include = firefox

# No heavy office/media packages
exclude = libreoffice* thunderbird* rhythmbox* shotwell*

[services]
hyve-backend = enabled
hyve-discovery = enabled
hyve-agent-daemon = enabled
hyve-vision = enabled-if-model
hyve-llm = disabled-by-default
hyve-dbus = enabled

[desktop]
# System tray autostart
autostart = hyve-dashboard.desktop
# D-Bus service
dbus_service = com.hyve.Agent.conf
# Polkit policy
polkit_policy = com.hyve.agent.policy

[resources]
min_ram_gb = 8
min_disk_gb = 20
# Leave resources for desktop usage
max_cpu_percent = 75
