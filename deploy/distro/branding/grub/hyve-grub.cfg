# HyveOS GRUB Configuration
# Install to /etc/default/grub.d/hyve.cfg

# Branding
GRUB_DISTRIBUTOR="HyveOS"

# Boot splash
GRUB_CMDLINE_LINUX_DEFAULT="quiet splash"

# Timeout (seconds)
GRUB_TIMEOUT=5

# Custom menu entries are appended by update-grub
# The recovery entry is added automatically by Ubuntu's grub scripts

# Background image (1024x768 PNG)
# GRUB_BACKGROUND="/boot/grub/splash.png"
