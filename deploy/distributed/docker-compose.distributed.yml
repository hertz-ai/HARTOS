# HyveOS Distributed Multi-Node Test
# Usage: docker-compose -f deploy/distributed/docker-compose.distributed.yml up
#
# Spins up 3 Hyve nodes + shared Redis for distributed task execution.
# Node 1 = central (submits goals), Node 2+3 = workers (claim + execute).
#
# Test: POST a goal to :6777, watch workers claim and execute it.

version: '3.8'

x-hyve-common: &hyve-common
  build:
    context: ../..
    dockerfile: deploy/cloud/Dockerfile
  environment: &hyve-env
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    HEVOLVE_DB_PATH: /var/lib/hyve/hyve.db
    HEVOLVE_AGENT_ENGINE_ENABLED: "true"
    HEVOLVE_AGENT_POLL_INTERVAL: "10"
    HEVOLVE_WORKER_POLL_INTERVAL: "5"
    PYTHONDONTWRITEBYTECODE: "1"
    OPENAI_API_KEY: "${OPENAI_API_KEY:-test-key}"
    GROQ_API_KEY: "${GROQ_API_KEY:-}"
  depends_on:
    redis:
      condition: service_healthy
  restart: on-failure
  networks:
    - hivenet

services:
  # Shared Redis for distributed task coordination
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hivenet

  # Central node — submits goals, runs agent daemon
  node-central:
    <<: *hyve-common
    container_name: hyve-central
    hostname: hyve-central
    ports:
      - "6777:6777"
    environment:
      <<: *hyve-env
      HEVOLVE_NODE_ID: node-central
      HEVOLVE_NODE_NAME: hyve-central
      HEVOLVE_BASE_URL: http://hyve-central:6777
      HEVOLVE_SEED_PEERS: http://hyve-worker-1:6778,http://hyve-worker-2:6779

  # Worker node 1 — claims tasks, executes via local /chat
  node-worker-1:
    <<: *hyve-common
    container_name: hyve-worker-1
    hostname: hyve-worker-1
    ports:
      - "6778:6777"
    environment:
      <<: *hyve-env
      HEVOLVE_NODE_ID: node-worker-1
      HEVOLVE_NODE_NAME: hyve-worker-1
      HEVOLVE_BASE_URL: http://hyve-worker-1:6777
      HEVOLVE_SEED_PEERS: http://hyve-central:6777,http://hyve-worker-2:6779

  # Worker node 2 — claims tasks, executes via local /chat
  node-worker-2:
    <<: *hyve-common
    container_name: hyve-worker-2
    hostname: hyve-worker-2
    ports:
      - "6779:6777"
    environment:
      <<: *hyve-env
      HEVOLVE_NODE_ID: node-worker-2
      HEVOLVE_NODE_NAME: hyve-worker-2
      HEVOLVE_BASE_URL: http://hyve-worker-2:6777
      HEVOLVE_SEED_PEERS: http://hyve-central:6777,http://hyve-worker-1:6778

networks:
  hivenet:
    driver: bridge
