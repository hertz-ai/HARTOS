version: '3.8'

# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ============================================
  # Backend - Production Settings
  # ============================================
  backend:
    restart: always
    environment:
      - FLASK_ENV=production
      - DEBUG=false
      - WORKERS=4
      - THREADS=4
      - TIMEOUT=120
      - LOG_LEVEL=INFO
      # Security settings
      - SECURE_COOKIES=true
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_HTTPONLY=true
      # Performance tuning
      - GUNICORN_KEEP_ALIVE=5
      - GUNICORN_MAX_REQUESTS=1000
      - GUNICORN_MAX_REQUESTS_JITTER=50
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service,environment"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.yourdomain.com`)"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  # ============================================
  # MySQL - Production Settings
  # ============================================
  mysql:
    restart: always
    environment:
      - MYSQL_USER=${MYSQL_USER:-chatbot}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DB:-chatbot_db}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    command:
      - "mysqld"
      - "--max-connections=200"
      - "--innodb-buffer-pool-size=256M"
      - "--innodb-log-file-size=64M"
      - "--innodb-flush-log-at-trx-commit=2"
      - "--innodb-flush-method=O_DIRECT"
      - "--slow-query-log=1"
      - "--slow-query-log-file=/var/lib/mysql/slow.log"
      - "--long-query-time=1"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    # Remove port exposure in production (access via internal network only)
    ports: []

  # ============================================
  # Redis - Production Settings
  # ============================================
  redis:
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --timeout 0
      --tcp-backlog 511
      --save 900 1
      --save 300 10
      --save 60 10000
      --rdbcompression yes
      --rdbchecksum yes
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
        reservations:
          cpus: '0.1'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    # Remove port exposure in production (access via internal network only)
    ports: []

  # ============================================
  # Nginx - Production Settings (enabled by default in prod)
  # ============================================
  nginx:
    restart: always
    profiles: []  # Remove profile restriction, always run in prod
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# ============================================
# Production Volume Configuration
# ============================================
volumes:
  mysql-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/llm-chatbot/data/mysql
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/llm-chatbot/data/redis
  backend-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/llm-chatbot/logs/backend
  backend-media:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/llm-chatbot/data/media
  backend-agent-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/llm-chatbot/data/agent
  nginx-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/llm-chatbot/logs/nginx
