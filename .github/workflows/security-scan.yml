name: Security Scan

on:
  push:
    branches: [main, gpt4.1]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit SAST scan
        run: |
          bandit -r . \
            -x ./venv310,./venv,./autogen-0.2.37,./.pycharm_plugin,./tests,./build,./dist \
            -c pyproject.toml \
            -f json -o bandit-report.json \
            --severity-level medium \
            || true

      - name: Display Bandit results
        if: always()
        run: |
          bandit -r . \
            -x ./venv310,./venv,./autogen-0.2.37,./.pycharm_plugin,./tests,./build,./dist \
            -c pyproject.toml \
            --severity-level medium \
            || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            --requirement requirements.txt \
            --desc \
            --output pip-audit-report.json \
            --format json \
            || true

      - name: Display pip-audit results
        if: always()
        run: |
          pip-audit --requirement requirements.txt --desc || true

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  lint:
    name: Linting (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=100 \
            --exclude=.git,__pycache__,venv,venv310,build,dist,autogen-0.2.37,.pycharm_plugin \
            --ignore=E501,W503,E203 \
            --count --statistics \
            || true
