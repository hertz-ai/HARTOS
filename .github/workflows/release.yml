name: Release — Build, Sign, ISO, Torrent, Pages

# Trigger: manual dispatch with version, or push to main (for ISO builds)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3 — without "v" prefix)'
        required: true
        type: string
      build_iso:
        description: 'Build ISOs and torrents'
        type: boolean
        default: true
  push:
    branches: [main, gpt4.1, develop]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════
  # 1. Test Gate
  # ═══════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . --no-deps 2>/dev/null || true
          pip install pytest pytest-asyncio
          pip install grep-ast tree-sitter tree-sitter-language-pack 2>/dev/null || true
          python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True)" 2>/dev/null || true

      - name: Debug core.platform import
        run: |
          cd ${{ github.workspace }}
          python -c "
          import sys; sys.path.insert(0, '.')
          import importlib.util
          spec = importlib.util.find_spec('core.platform.events')
          print(f'events spec: {spec}')
          print(f'events origin: {spec.origin if spec else None}')
          # Try direct import
          try:
              from core.platform.events import EventBus
              print(f'EventBus: {EventBus}')
          except Exception as e:
              print(f'EventBus import error: {e}')
              # Check what core resolves to
              import core
              print(f'core.__file__: {getattr(core, \"__file__\", \"NO FILE\")}')
              print(f'core.__path__: {getattr(core, \"__path__\", \"NO PATH\")}')
              import core.platform
              print(f'core.platform.__file__: {getattr(core.platform, \"__file__\", \"NO FILE\")}')
              print(f'core.platform.__path__: {getattr(core.platform, \"__path__\", \"NO PATH\")}')
          "

      - name: Run tests
        env:
          HEVOLVE_DB_PATH: ':memory:'
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest \
            tests/unit/ \
            tests/functional/ \
            --noconftest -q --tb=line

  # ═══════════════════════════════════════════════════════════
  # 2. Tag + Sign (only on manual dispatch with version)
  # ═══════════════════════════════════════════════════════════
  tag-and-sign:
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Version must be semver (e.g. 1.2.3)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check tag does not exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "ERROR: Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" \
            -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          # Tag push triggers release-sign.yml for Ed25519 manifest signing

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build Python distribution
        run: |
          pip install build setuptools-scm
          python -m build

      - name: Strip HevolveAI source from wheel
        run: |
          # Install HevolveAI (transitive dep) so compile script can find it
          pip install -e . --no-deps 2>/dev/null || true
          # Compile HevolveAI .py → .pyc and strip source
          python scripts/compile_hevolveai.py --strip-source \
            --output-dir /tmp/hevolveai_compiled \
            --manifest-out dist/hevolveai_manifest.json || echo "HevolveAI not installed — skipping"
          # Repack the wheel with compiled-only HevolveAI stubs
          python scripts/build_compiled_wheel.py || echo "Compiled wheel build skipped"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "HART OS v${{ steps.version.outputs.version }}"
          files: |
            dist/*.whl
            dist/*.tar.gz
          body: |
            ## HART OS v${{ steps.version.outputs.version }}

            Hevolve Hive Agentic Runtime — crowdsourced compute for autonomous AI training.

            ### Downloads

            | Format | Description |
            |--------|-------------|
            | `.whl` | Python wheel (pip install) |
            | `.tar.gz` | Source distribution |
            | `.iso` | Bootable installer (see ISO job below) |
            | `.torrent` | P2P download (web-seeded via GitHub CDN) |

            ### Verify

            ```bash
            # Check SHA-256
            sha256sum -c hart-os-*.sha256

            # Verify release signature (Ed25519)
            python -c "from security.master_key import verify_release_manifest; \
              import json; m = json.load(open('release_manifest.json')); \
              print('VALID' if verify_release_manifest(m) else 'INVALID')"
            ```
          generate_release_notes: true

  # ═══════════════════════════════════════════════════════════
  # 3. Build ISOs + Torrents (parallel matrix)
  # ═══════════════════════════════════════════════════════════
  build-iso:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_iso == 'true') ||
      (github.event_name == 'push')
    # ISO build runs independently — tests run in parallel, don't block ISO
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        target: [iso-server, iso-desktop, iso-edge]
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v12
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get autoremove -y && sudo apt-get clean
          df -h /

      - name: Build ${{ matrix.target }}
        working-directory: nixos
        run: |
          time nix build .#${{ matrix.target }} --no-link --print-out-paths --show-trace \
            | tee /tmp/build-output.txt

      - name: Checksum + Torrent
        run: |
          echo "=== Build output ==="
          cat /tmp/build-output.txt || echo "No build output file"
          BUILD_PATH=$(cat /tmp/build-output.txt | head -1 | tr -d '[:space:]')
          echo "BUILD_PATH: '$BUILD_PATH'"

          if [[ -z "$BUILD_PATH" ]]; then
            echo "ERROR: Nix build produced no output path"
            echo "Check the Build step logs above for errors"
            exit 0
          fi

          echo "=== Listing build path ==="
          ls -la "$BUILD_PATH" 2>/dev/null || echo "Path does not exist: $BUILD_PATH"
          find "$BUILD_PATH" -maxdepth 3 -type f 2>/dev/null | head -20 || true

          # Find ISO file
          FILE=""
          if [[ -d "$BUILD_PATH/iso" ]]; then
            FILE=$(ls "$BUILD_PATH/iso/"*.iso 2>/dev/null | head -1)
          elif [[ -d "$BUILD_PATH" ]]; then
            FILE=$(find "$BUILD_PATH" -maxdepth 3 -type f \
              \( -name "*.iso" -o -name "*.qcow2" -o -name "*.raw" -o -name "*.img" \) | head -1)
          fi

          echo "FILE: '$FILE'"

          if [[ -z "${FILE:-}" ]] || [[ ! -f "$FILE" ]]; then
            echo "No output file found in build path"
            exit 0
          fi

          BASENAME=$(basename "$FILE")
          mkdir -p /tmp/release-artifacts

          # Copy to artifacts dir
          cp "$FILE" /tmp/release-artifacts/

          # SHA-256 checksum
          sha256sum "$FILE" | sed "s|.*/||" > "/tmp/release-artifacts/${BASENAME}.sha256"

          # Create .torrent with web seed
          sudo apt-get install -y -qq mktorrent
          VERSION="${GITHUB_REF_NAME#v}"
          WEBSEED="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${BASENAME}"
          mktorrent -l 22 \
            -c "HART OS — Hevolve Hive Agentic Runtime. https://github.com/${{ github.repository }}" \
            -w "$WEBSEED" \
            -o "/tmp/release-artifacts/${BASENAME}.torrent" \
            "$FILE"

          # Summary
          SIZE=$(du -h "$FILE" | cut -f1)
          SHA=$(cat "/tmp/release-artifacts/${BASENAME}.sha256" | cut -d' ' -f1)
          echo "## ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- **File**: \`$BASENAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA256**: \`$SHA\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Torrent**: \`${BASENAME}.torrent\` (web-seeded)" >> $GITHUB_STEP_SUMMARY

      - name: Upload ISO + Torrent artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: /tmp/release-artifacts/
          retention-days: 30

      - name: Attach to GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          files: /tmp/release-artifacts/*

  # ═══════════════════════════════════════════════════════════
  # 4. Deploy Docs to GitHub Pages
  # ═══════════════════════════════════════════════════════════
  deploy-docs:
    # Docs deploy on any push or manual dispatch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Build docs
        run: |
          mkdocs build --strict --site-dir _site
          echo "docs.hevolve.ai" > _site/CNAME

      - name: Run tests + generate reports
        continue-on-error: true
        env:
          HEVOLVE_DB_PATH: ':memory:'
        run: |
          mkdir -p _site/test-reports/junit _site/test-reports/coverage
          python -m pytest \
            tests/unit/ tests/functional/ \
            --noconftest -v --tb=short \
            --junitxml=_site/test-reports/junit/results.xml \
            --cov=integrations --cov=security --cov=core \
            --cov-report=html:_site/test-reports/coverage \
            --cov-report=term-missing || true

      - name: Generate test reports index
        run: |
          cat > _site/test-reports/index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>HART OS Test Reports</title>
          <style>
            body{font-family:system-ui,sans-serif;max-width:800px;margin:60px auto;padding:0 20px;color:#333}
            h1{color:#512da8;border-bottom:2px solid #512da8;padding-bottom:10px}
            a{color:#512da8;text-decoration:none}a:hover{text-decoration:underline}
            .card{border:1px solid #ddd;border-radius:8px;padding:20px;margin:16px 0}
            .card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}.card h2{margin-top:0}
          </style></head>
          <body>
            <a href="../">Back to Docs</a>
            <h1>HART OS Test Reports</h1>
            <div class="card"><h2><a href="coverage/index.html">Code Coverage Report</a></h2>
            <p>Interactive line-by-line coverage browser.</p></div>
            <div class="card"><h2><a href="junit/results.xml">JUnit XML Results</a></h2>
            <p>Machine-readable test results.</p></div>
          </body></html>
          INDEXEOF

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Restore custom domain
        run: |
          gh api repos/${{ github.repository }}/pages \
            --method PUT \
            --field cname="docs.hevolve.ai" \
            --field https_enforced=true || true
        env:
          GH_TOKEN: ${{ github.token }}
