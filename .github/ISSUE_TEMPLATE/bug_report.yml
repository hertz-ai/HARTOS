name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Tell us what went wrong
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the backend with...
        2. Send a request to...
        3. See error...
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Ubuntu 22.04, Windows 11, HART OS ISO
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.10.12
